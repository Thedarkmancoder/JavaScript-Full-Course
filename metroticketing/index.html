<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Ticketing </title>
</head>
<body>
    <h1 style=" text-align: center;">Practice Exercise</h1>
    <h2 style="text-align: center;">Give discount based on age, gender for metro ticket.
           <p style="text-align: center;"> - females get 50% off</p>
           <p style="text-align: center;"> - kids under 5 years of age are free </p>
           <p style="text-align: center;"> - kids up to 8 years have half ticket</p>
           <p style="text-align: center;"> - People Over 65 years of age only pay 30% of the ticket.</p>
           <p style="text-align: center;">- In case of multiple discounts max discount will apply.</p>
        
    </h2>

    <script>
        let age = 55;
        let gender = 'female'; // male and female
        let finalDiscount;

        if (age <= 5 ){
            finalDiscount = 100;
        } else if(gender === 'female' || age <= 8){
            finalDiscount = 50;
        }else if(age >= 65){
            finalDiscount = 30;
        }else {
            finalDiscount = 0;
        }
        console.log(`Your Final Discount is ${finalDiscount}`)

    </script>
</body>
</html>
