    <h1> DATE </h1>
    <h2>
        1. new Date() creates a new Date object with the current date and time. <br>
        2. key Methods: <br>
            getTime(): getMilliseconds since Epoch.<br>
            getFullYear(): 4-digit year. <br>
            getDay(): Day ot the week. <br>
            getMinutes(): Current hour. <br>
            getHours(): Current hour. <br>
        3. Crucial for timestamps, scheduling etc. <br>   
    </h2>
   
    <script>
        
let mydate = new Date();
console.log(mydate.getFullYear());
console.log(mydate.getMonth());
console.log(mydate.getDay());
console.log(mydate.getHours());
console.log(mydate.getMinutes());
console.log(mydate.setTime());
console.log(mydate.getMilliseconds());
