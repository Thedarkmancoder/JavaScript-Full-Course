<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CelsiusToFahrneit</title>
</head>
<body>
    <h1> Celsious To Fahreneit</h1>
    <script>
        function Tofahrenheit(celsiousValue){
        return 9/5 * celsiousValue + 32;
        }
        console.log(Tofahrenheit(1));
        console.log(Tofahrenheit(34));
        console.log(Tofahrenheit(53));
    </script>
</body>
</html>
