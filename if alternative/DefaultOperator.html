<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Default Operator</title>
</head>
<body>
    <script>
        // Default Operator : value ?? fallbackValue
        // use when you want to consider only null and
        // undefined as falsy.
        let age;
        let finalAge = age ?? 18;
        console.log(age);
        console.log(finalAge);
        //output 18
    </script>
</body>
</html>
