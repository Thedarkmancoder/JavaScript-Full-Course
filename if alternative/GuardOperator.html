<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Operator</title>
</head>
<body>
    <script>
        // Guard Operator: value || defaultValue
        // use when a fallback value is needed.
        let age;
        let finalAge = age || 18;
        console.log(age);
        console.log(finalAge);
        //output 18
    </script>
</body>
</html>
